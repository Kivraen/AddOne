[env:addone-esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.filesystem = littlefs
lib_deps =
  bblanchon/ArduinoJson@^6.21.5
  adafruit/RTClib@^2.1.4
  fastled/FastLED@^3.6.0
  knolleary/PubSubClient@^2.8
build_flags =
  -D CORE_DEBUG_LEVEL=0
