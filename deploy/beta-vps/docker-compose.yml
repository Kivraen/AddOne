services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      - realtime-gateway
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  realtime-gateway:
    build:
      context: ../../services/realtime-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      COMMAND_RELAY_PORT: 8787
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MQTT_USERNAME: ${MQTT_GATEWAY_USERNAME}
      MQTT_PASSWORD: ${MQTT_GATEWAY_PASSWORD}
    depends_on:
      - mosquitto
    expose:
      - "8787"

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "8883:8883"
    volumes:
      - ./mosquitto/acl.txt:/mosquitto/config/acl.txt:ro
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwords.txt:/mosquitto/config/passwords.txt:ro
      - /etc/letsencrypt/live/${MQTT_DOMAIN}:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  caddy_data:
  caddy_config:
  mosquitto_data:
  mosquitto_log:
