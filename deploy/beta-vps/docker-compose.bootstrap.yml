services:
  realtime-gateway:
    build:
      context: ../../services/realtime-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      COMMAND_RELAY_PORT: 8787
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MQTT_USERNAME: ${MQTT_GATEWAY_USERNAME}
      MQTT_PASSWORD: ${MQTT_GATEWAY_PASSWORD}
    depends_on:
      - mosquitto
    ports:
      - "127.0.0.1:8787:8787"

  broker-password-sync:
    build:
      context: .
      dockerfile: ./broker-password-sync.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MQTT_BROKER_CONTAINER_NAME: ${COMPOSE_PROJECT_NAME}-mosquitto-1
      MQTT_PASSWORD_SYNC_INTERVAL_MS: ${MQTT_PASSWORD_SYNC_INTERVAL_MS:-5000}
      MQTT_PASSWORD_SYNC_OUTPUT_PATH: /work/mosquitto/passwords.txt
    depends_on:
      - mosquitto
    volumes:
      - ./mosquitto:/work/mosquitto
      - /var/run/docker.sock:/var/run/docker.sock

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "8883:8883"
    volumes:
      - ./mosquitto:/mosquitto/config:ro
      - ./certs:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  mosquitto_data:
  mosquitto_log:
