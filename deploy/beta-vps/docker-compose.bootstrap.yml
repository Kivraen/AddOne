services:
  realtime-gateway:
    build:
      context: ../../services/realtime-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      COMMAND_RELAY_PORT: 8787
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MQTT_USERNAME: ${MQTT_GATEWAY_USERNAME}
      MQTT_PASSWORD: ${MQTT_GATEWAY_PASSWORD}
    depends_on:
      - mosquitto
    ports:
      - "127.0.0.1:8787:8787"

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "8883:8883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwords.txt:/mosquitto/config/passwords.txt:ro
      - ./certs:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  mosquitto_data:
  mosquitto_log:
